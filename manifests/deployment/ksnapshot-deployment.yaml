apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ksnapshot
  name: ksnapshot
  namespace: ksnapshot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ksnapshot
  template:
    metadata:
      labels:
        app: ksnapshot
    spec:
      serviceAccountName: ksnapshot-sa
      containers:
        - image: ghcr.io/clickandmortar/ksnapshot:latest
          name: ksnapshot
          imagePullPolicy: Always
          env:
            - name: MODE
              value: cluster
