apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ksnapshot
  namespace: ksnapshot
rules:
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - create
      - update
      - get
      - list
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - update
      - get
      - delete
