apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ksnapshot
rules:
  - apiGroups:
      - ksnapshot.clickandmortar.io
    resources:
      - schedules
    verbs:
      - get
      - list
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
