apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ksnapshot
rules:
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - create
      - update
      - get
      - list
      - delete
  - apiGroups: [""]
    resources:
      - pods
      - services
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
