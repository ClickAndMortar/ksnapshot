apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # name must match the spec fields below, and be in the form: <plural>.<group>
  name: schedules.ksnapshot.clickandmortar.io
spec:
  preserveUnknownFields: false
  # group name to use for REST API: /apis/<group>/<version>
  group: ksnapshot.clickandmortar.io
  versions:
    - name: v1alpha1
      served: true
      # One and only one version must be marked as the storage version.
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                cronSpec:
                  type: string
#                rotationScheme:
#                  type: string
#                  required: true
#                  default: linear
#                  enum:
#                    - linear
#                    - fibonacci
                type:
                  type: string
                  enum:
                    - mysql
                    - elasticsearch
                config:
                  type: object
                  properties:
                    mysql:
                      type: object
                      properties:
                        version:
                          type: string
                          enum:
                            - "5.7"
                            - "8"
                          default: "8"
                        host:
                          type: string
                        port:
                          type: integer
                          default: 3306
                        username:
                          type: string
                        passwordSecretKeyRef:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                              default: password
                        database:
                          type: string
                        arguments:
                          type: string
                        tables:
                          type: array
                          items:
                            type: string
                        excludedTables:
                          type: array
                          items:
                            type: string
                        splitPerTable:
                          type: boolean
                          default: false
                    elasticsearch:
                      type: object
                      properties:
                        url:
                          type: string
                        username:
                          type: string
                        passwordSecretKeyRef:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                              default: password
                        indexPattern:
                          type: string
                encryption:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    recipient:
                      type: string
                      description: age or SSH public key
                backend:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - s3
                        - gcs
                        - local
                    config:
                      type: object
                      properties:
                        bucket:
                          type: string
                        path:
                          type: string
                        s3Endpoint:
                          type: string
                        s3AccessKey:
                          type: string
                        s3SecretKeyRef:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                        gcpServiceAccountKeyRef:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                  required:
                    - type
                    - config
                resources:
                  type: object
                  properties:
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
              required:
                - cronSpec
                - type
                - config
                - backend
          required:
            - spec
  # Namespaced or Cluster
  scope: Namespaced
  names:
    plural: schedules
    singular: schedule
    kind: KSnapshotSchedule
    shortNames:
      - kss
