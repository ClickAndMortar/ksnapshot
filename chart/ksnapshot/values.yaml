replicaCount: 1

image:
  repository: ghcr.io/clickandmortar/ksnapshot
  tag: ""
  pullPolicy: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

backupJob:
  imagePullPolicy: ""
  serviceAccount:
    create: true
    name: ""
    annotations: {}

rbac:
  create: true

encryption:
  enabled: false
  recipient: ""

dumperImages:
  mysql:
    v5_7: ""
    v8: ""
  postgresql:
    v16: ""
  elasticsearch: ""

s3:
  bucket: ""
  region: ""
  endpoint: ""

# Option A: let Helm create the secret
secret:
  create: false
  awsAccessKeyId: ""
  awsSecretAccessKey: ""

# Option B: use an existing secret (default)
existingSecret: "ksnapshot-secret"

# Use an existing configmap instead of creating one
existingConfigMap: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
