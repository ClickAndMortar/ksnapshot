{{- if .Values.backupJob.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ksnapshot.backupJobServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksnapshot.labels" . | nindent 4 }}
  {{- with .Values.backupJob.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
