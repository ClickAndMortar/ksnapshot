{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ksnapshot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksnapshot.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - create
      - update
      - get
      - list
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - update
      - get
      - delete
{{- end }}
