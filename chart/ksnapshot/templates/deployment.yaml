apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ksnapshot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksnapshot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ksnapshot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ksnapshot.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ include "ksnapshot.serviceAccountName" . }}
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: MODE
              value: cluster
            - name: CONTROL_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: BACKUP_CONFIGMAP_NAME
              value: {{ include "ksnapshot.configMapName" . | quote }}
            - name: BACKUP_SECRET_NAME
              value: {{ include "ksnapshot.secretName" . | quote }}
            - name: BACKUP_JOB_SERVICE_ACCOUNT_NAME
              value: {{ include "ksnapshot.backupJobServiceAccountName" . | quote }}
            - name: BACKUP_IMAGE_PULL_POLICY
              value: {{ .Values.backupJob.imagePullPolicy | quote }}
            - name: MYSQL_DUMPER_IMAGE_5_7
              value: {{ include "ksnapshot.mysql57Image" . | quote }}
            - name: MYSQL_DUMPER_IMAGE_8
              value: {{ include "ksnapshot.mysql8Image" . | quote }}
            - name: POSTGRESQL_DUMPER_IMAGE_16
              value: {{ include "ksnapshot.postgresql16Image" . | quote }}
            - name: ELASTICSEARCH_DUMPER_IMAGE
              value: {{ include "ksnapshot.elasticsearchImage" . | quote }}
            {{- if .Values.encryption.enabled }}
            - name: DEFAULT_ENCRYPTION_ENABLED
              value: "true"
            - name: DEFAULT_ENCRYPTION_RECIPIENT
              value: {{ required "encryption.recipient is required when encryption.enabled is true" .Values.encryption.recipient | quote }}
            {{- end }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
