name: MySQL dumpers CI/CD Workflow

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/mysql-dumpers.yaml'
      - 'dumpers/mysql/**'

jobs:
  build:
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${GITHUB_SHA::8})" >> $GITHUB_OUTPUT

      - name: Build and push Docker image for MySQL 8 dumper
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dumpers/mysql/8/Dockerfile
          push: true
          tags: ghcr.io/clickandmortar/ksnapshot-dumper-mysql-8:${{ steps.sha.outputs.short }},ghcr.io/clickandmortar/ksnapshot-dumper-mysql-8:latest

