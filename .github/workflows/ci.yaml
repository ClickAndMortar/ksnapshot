name: CI

on:
  push:
    branches:
      - main

permissions:
  packages: write

jobs:
  lint-and-test:
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build-images:
    runs-on: arc-runner-set
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - name: operator
            file: Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot
          - name: mysql-8
            file: dumpers/mysql/8/Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot-dumper-mysql-8
          - name: elasticsearch
            file: dumpers/elasticsearch/Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot-dumper-elasticsearch
          - name: postgresql-16
            file: dumpers/postgresql/16/Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot-dumper-postgresql-16
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ matrix.image }}:main-${{ steps.sha.outputs.short }}
