name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ inputs.tag }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: operator
            file: Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot
          - name: mysql-8
            file: dumpers/mysql/8/Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot-dumper-mysql-8
          - name: elasticsearch
            file: dumpers/elasticsearch/Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot-dumper-elasticsearch
          - name: postgresql-16
            file: dumpers/postgresql/16/Dockerfile
            image: ghcr.io/clickandmortar/ksnapshot-dumper-postgresql-16
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ matrix.image }}:latest

  release:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Create gh-pages branch if it doesn't exist
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout main
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: helm package chart/ksnapshot -d .cr-release-packages

      - name: Extract version
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with chart
        run: |
          gh release create "${RELEASE_TAG}" \
            --generate-notes \
            .cr-release-packages/ksnapshot-${{ steps.version.outputs.version }}.tgz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm repo index
        run: |
          git worktree add gh-pages-ws gh-pages
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          helm repo index .cr-release-packages --url "${RELEASE_URL}" --merge gh-pages-ws/index.yaml
          cp .cr-release-packages/index.yaml gh-pages-ws/index.yaml
          cd gh-pages-ws
          git add index.yaml
          git commit -m "Update index.yaml for ${RELEASE_TAG}"
          git push origin gh-pages
