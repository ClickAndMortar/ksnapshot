name: Elasticsearch dumper CI/CD Workflow

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/elasticsearch-dumper.yaml'
      - 'dumpers/elasticsearch/**'

jobs:
  build:
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "::set-output name=short::$(echo ${GITHUB_SHA::8})"

      - name: Build and push Docker image for Elasticsearch dumper
        uses: docker/build-push-action@v2
        with:
          context: .
          file: dumpers/mysql/8/Dockerfile
          push: true
          tags: ghcr.io/clickandmortar/ksnapshot-dumper-elasticsearch:${{ steps.sha.outputs.short }},ghcr.io/clickandmortar/ksnapshot-dumper-elasticsearch:latest
