name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Read new version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" chart/ksnapshot/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/ksnapshot/Chart.yaml

      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add package.json chart/ksnapshot/Chart.yaml
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"

      - name: Push
        run: git push origin main --follow-tags

      - name: Wait for push propagation
        run: sleep 5

      - name: Trigger release workflow
        run: gh workflow run release.yaml --ref main --field tag="v${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
